[build]
  publish = "public"
  functions = "netlify/functions"

# Header di sicurezza applicati a tutte le risposte (pagine statiche e
# Netlify Functions). Le function impostano gia' di loro Content-Type e
# Cache-Control: questi header si aggiungono, non li sovrascrivono.
#
# Nota su script-src: NON contiene 'unsafe-inline' di proposito. Tutto il
# JS applicativo e' stato spostato in file esterni (public/app.js,
# public/security-check.js) per poter negare l'esecuzione di qualunque
# script iniettato via HTML (XSS). Il widget Netlify Identity tiene il JWT
# dell'utente in localStorage: bloccare l'esecuzione di script inline e' la
# difesa che conta davvero contro il furto di quel token.
#
# style-src include 'unsafe-inline' perche' il CSS e' ancora inline nelle
# pagine: un CSS iniettato non puo' leggere localStorage ne' eseguire
# codice, quindi il rischio residuo e' accettabile.
#
# Nota su identity.netlify.com: NON e' piu' presente in questa CSP. Il
# login non usa piu' il widget esterno (netlify-identity-widget.js), che
# caricava script/frame da quel dominio - dominio che ad-blocker e
# protezioni anti-tracciamento a volte bloccano, impedendo l'apertura del
# login. Il client in identity-client.js parla solo con /.netlify/identity
# sullo stesso dominio del sito, gia' coperto da 'self'.
[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-src 'none'; frame-ancestors 'none'; base-uri 'none'; form-action 'none'; object-src 'none'; upgrade-insecure-requests"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer"
    Permissions-Policy = "geolocation=(), camera=(), microphone=(), payment=(), usb=(), interest-cohort=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
