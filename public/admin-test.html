<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Test di sicurezza — DA ELIMINARE dopo il PASS</title>
<style>
body{font-family:sans-serif;max-width:640px;margin:40px auto;padding:0 16px}
.pass{color:green}.fail{color:red}
li{margin:6px 0}
</style>
</head>
<body>
<h1>Test accessi non autorizzati</h1>
<p>Questa pagina verifica che nessuna funzione o dato sia accessibile senza sessione valida. Se tutti i test sono <strong>PASS</strong>, elimina questo file dal repository.</p>
<ul id="results"></ul>
<script>
const tests = [
  { name: "GET /api/links senza sessione", url: "/api/links", expect: 401 },
  { name: "POST /api/links senza sessione", url: "/api/links", method: "POST", expect: 401 },
  { name: "DELETE /api/links senza sessione", url: "/api/links?id=x", method: "DELETE", expect: 401 },
  { name: "GET /api/users senza sessione", url: "/api/users", expect: 401 },
  { name: "POST /api/users senza sessione", url: "/api/users", method: "POST", expect: 401 },
  { name: "GET /api/fetch-ical senza sessione", url: "/api/fetch-ical?url=https://example.com/x.ics", expect: 401 },
  { name: "GET /api/auth senza sessione", url: "/api/auth", expect: 401 },
];

async function run() {
  const list = document.getElementById("results");
  let allPass = true;
  for (const t of tests) {
    let status;
    try {
      const res = await fetch(t.url, { method: t.method || "GET", credentials: "omit" });
      status = res.status;
    } catch {
      status = "ERRORE RETE";
    }
    const pass = status === t.expect;
    if (!pass) allPass = false;
    const li = document.createElement("li");
    li.className = pass ? "pass" : "fail";
    li.textContent = `${t.name}: ricevuto ${status} (atteso ${t.expect}) — ${pass ? "PASS" : "FAIL"}`;
    list.appendChild(li);
  }
  const summary = document.createElement("h2");
  summary.textContent = allPass
    ? "TUTTI I TEST SUPERATI — puoi eliminare questa pagina."
    : "ATTENZIONE: almeno un test è FALLITO — non eliminare, correggi prima.";
  summary.className = allPass ? "pass" : "fail";
  list.after(summary);
}
run();
</script>
</body>
</html>
